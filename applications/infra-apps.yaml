apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-apps
  namespace: argocd
spec:
  project: gitops-platform
  source:
    repoURL: https://github.com/ravilanka999/terraform-kubernetes-gitops.git
    targetRevision: main
    path: kubernetes/infra-manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false  # kube-system exists
    - PruneLast=true
    - Validate=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Infra syncs after namespaces (wave 5)
  info:
  - name: 'Purpose'
    value: 'Deploy StorageClass, Ingress Controller, etc.'
