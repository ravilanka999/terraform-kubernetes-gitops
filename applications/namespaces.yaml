apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  project: gitops-platform
  source:
    repoURL: https://github.com/ravilanka999/terraform-kubernetes-gitops.git
    targetRevision: main
    path: namespaces
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd  # Apply to cluster root
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false  # Can't create argocd itself
    - PruneLast=true
    - Validate=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Namespace applications should sync first (wave 0)
  info:
  - name: 'Purpose'
    value: 'Create all namespaces'
