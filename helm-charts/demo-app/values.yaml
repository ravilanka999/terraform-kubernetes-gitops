# Default values for demo-app.
# This file is overrideable per environment (values-dev.yaml, values-prod.yaml)

replicaCount: 2

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "alpine"

# Override for different environments (set in values-<env>.yaml or via Argo CD)
# image:
#   repository: your-account-id.dkr.ecr.ap-southeast-2.amazonaws.com/demo-app
#   tag: "1.0.0"
#   pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  metricsPort: 8080
  annotations: {}
    # For AWS Load Balancer uncomment:
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

ingress:
  enabled: false
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: demo-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: demo-app-tls
  #   hosts:
  #   - demo-app.example.com

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 15
      selectPolicy: Max

# Health probes configuration
probes:
  liveness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  startup:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 30

# Pod security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #   - ALL
  #   add:
  #   - NET_BIND_SERVICE  # Only if binding to privileged ports

nodeSelector: {}
  # node-role.kubernetes.io/worker: "true"

tolerations: []
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "general"
  #   effect: "NoSchedule"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - demo-app
        topologyKey: kubernetes.io/hostname

# ConfigMap data (for your application)
config:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  # DATABASE_URL: "postgresql://user:pass@postgres:5432/db"

# Secrets (use external-secrets.io or sealed-secrets in real scenarios)
# DO NOT store sensitive data in Git!
secrets: {}
  # DB_PASSWORD: "changeme"

# Persistence (StatefulSets would be better for stateful apps)
persistence:
  enabled: false
  existingClaim: ""
  storageClass: "ebs-sc"
  accessMode: ReadWriteOnce
  size: "1Gi"

# ServiceAccount (for app-specific IAM roles via IRSA)
serviceAccount:
  create: true
  name: demo-app
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/demo-app-role"

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false  # Requires Prometheus Operator
    interval: "30s"
    path: "/metrics"

# NetworkPolicy (uncomment if using Calico/Cilium)
