apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-app.fullname" . }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "demo-app.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: {{ .Values.minReadySeconds | default 30 }}
  template:
    metadata:
      labels:
        {{- include "demo-app.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "demo-app.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
          - |
            echo "Starting {{ .Chart.Name }}..."
            # Your application startup command here
            nginx -g 'daemon off;'
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.service.metricsPort }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.environment | default "production" | quote }}
        - name: APP_ENV
          value: {{ .Values.environment | default "production" | quote }}
        {{- range $key, $value := .Values.config }}
        - name: {{ $key | upper | replace "-" "_" }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.probes.liveness | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.probes.readiness | nindent 10 }}
        startupProbe:
          {{- toYaml .Values.probes.startup | nindent 10 }}
        volumeMounts:
        {{- range $key, $value := .Values.volumeMounts }}
        - name: {{ $key }}
          mountPath: {{ $value.mountPath }}
          {{- if $value.subPath }}
          subPath: {{ $value.subPath }}
          {{- end }}
          {{- if $value.readOnly }}
          readOnly: true
          {{- end }}
        {{- end }}
      volumes:
      {{- range $key, $value := .Values.volumes }}
      - name: {{ $key }}
        {{- toYaml $value | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      restartPolicy: Always
