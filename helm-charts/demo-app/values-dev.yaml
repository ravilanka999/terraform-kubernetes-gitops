# Development environment specific values

environment: development

replicaCount: 2

image:
  tag: "dev"  # Development tag
  pullPolicy: IfNotPresent

autoscaling:
  enabled: true
  minReplicas: 1  # Can scale down to 1 for cost savings
  maxReplicas: 3  # Small max for dev
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: "50m"      # Small for dev
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
  startup:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3

config:
  APP_ENV: "development"
  LOG_LEVEL: "debug"
  ENABLE_MOCKS: "true"

serviceAccount:
  create: true
  annotations: {}
