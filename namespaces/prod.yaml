apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    name: prod
    purpose: production
    environment: prod
    project: gitops-demo
    tier: application
    compliance: "high"
    cost-center: "prod-001"
    backup-policy: "hourly"
    security-level: "strict"
    sla: "99.9%"
    support-team: "oncall"
  annotations:
    description: "Production environment - high availability"
    owner: "platform-team"
    slack-channel: "#prod-alerts"
    pagerduty-service: "prod-platform"
    maintenance-window: "Sundays 02:00-06:00 UTC"
