apiVersion: v1
kind: Service
metadata:
  name: demo-app
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
    component: service
    project: gitops-demo
    tier: application
    environment: all
spec:
  type: ClusterIP  # Use LoadBalancer or NodePort for external access
  selector:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: None  # Change to ClientIP for sticky sessions
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster  # Route internally to same-zone endpoints
