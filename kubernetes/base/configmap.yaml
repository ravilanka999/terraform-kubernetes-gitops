apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
    component: configuration
    project: gitops-demo
    tier: application
    environment: all
data:
  # Application configuration
  APP_ENV: "production"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"

  # Example: nginx configuration (if using nginx)
  # nginx.conf: |
  #   events {
  #     worker_connections 1024;
  #   }
  #   http {
  #     include /etc/nginx/mime.types;
  #     default_type application/octet-stream;
  #     sendfile on;
  #     keepalive_timeout 65;
  #     server {
  #       listen 80;
  #       location /health {
  #         return 200 'OK';
  #         add_header Content-Type application/json;
  #       }
  #       location /metrics {
  #         proxy_pass http://localhost:8080;
  #       }
  #     }
  #   }

  # Database configuration example (would use secrets in production)
  # DB_HOST: "postgres.example.com"
  # DB_PORT: "5432"
  # DB_NAME: "demo_app"

  # Feature flags
  FEATURE_FLAG_NEW_UI: "false"
  FEATURE_FLAG_ENHANCED_LOGGING: "true"

  # External service endpoints
  # CATALOGUE_SERVICE_URL: "http://catalogue:8080"
  # CART_SERVICE_URL: "http://cart:8080"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-logging-config
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
    component: logging
    project: gitops-demo
    tier: application
    environment: all
data:
  log4j.properties: |
    log4j.rootLogger=INFO, stdout
    log4j.appender.stdout=org.apache.log4j.ConsoleAppender
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
    log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n
  logback.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <pattern>%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n</pattern>
        </encoder>
      </appender>
      <root level="INFO">
        <appender-ref ref="STDOUT" />
      </root>
    </configuration>
